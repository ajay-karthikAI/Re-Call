x-recall-build: &recall-build
  build:
    context: .
    dockerfile: backend/Dockerfile
  image: recall-backend:${RECALL_IMAGE_TAG:-latest}

x-recall-env: &recall-env
  APP_ENV: "${APP_ENV:-development}"
  APP_NAME: "${APP_NAME:-Re: Call}"
  API_PREFIX: "${API_PREFIX:-/api}"
  BACKEND_PUBLIC_URL: "${BACKEND_PUBLIC_URL:-http://127.0.0.1:8000}"
  FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-http://127.0.0.1:5173}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-gpt-5}"
  OPENAI_TRANSCRIPTION_MODEL: "${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}"
  OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}"
  EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-1536}"
  DATABASE_URL: "${DOCKER_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-recall}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before running docker-compose.app.yml}@postgres:5432/${POSTGRES_DB:-recall}}"
  REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379/0}"
  CELERY_BROKER_URL: "${DOCKER_CELERY_BROKER_URL:-${DOCKER_REDIS_URL:-redis://redis:6379/0}}"
  CELERY_RESULT_BACKEND: "${DOCKER_CELERY_RESULT_BACKEND:-${DOCKER_REDIS_URL:-redis://redis:6379/0}}"
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
  AWS_REGION: "${AWS_REGION:-us-east-1}"
  # Local/dev fallback only. For APP_ENV=production, set S3_BUCKET_NAME so
  # recordings and exports use S3 instead of container-local disk.
  S3_BUCKET_NAME: "${S3_BUCKET_NAME:-}"
  LOCAL_STORAGE_DIR: "/app/storage"
  ZOOM_CLIENT_ID: "${ZOOM_CLIENT_ID:-}"
  ZOOM_CLIENT_SECRET: "${ZOOM_CLIENT_SECRET:-}"
  ZOOM_OAUTH_SCOPES: "${ZOOM_OAUTH_SCOPES:-cloud_recording:read:list_recording_files cloud_recording:read:meeting_recording cloud_recording:read:meeting_transcript}"
  GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
  GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
  GOOGLE_OAUTH_SCOPES: "${GOOGLE_OAUTH_SCOPES:-openid email profile https://www.googleapis.com/auth/meetings.space.readonly}"
  MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID:-}"
  MICROSOFT_CLIENT_SECRET: "${MICROSOFT_CLIENT_SECRET:-}"
  MICROSOFT_TENANT_ID: "${MICROSOFT_TENANT_ID:-common}"
  MICROSOFT_OAUTH_SCOPES: "${MICROSOFT_OAUTH_SCOPES:-offline_access User.Read OnlineMeetings.Read OnlineMeetingTranscript.Read.All}"
  RUN_MIGRATIONS_ON_STARTUP: "${RUN_MIGRATIONS_ON_STARTUP:-false}"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-recall}"
      POSTGRES_USER: "${POSTGRES_USER:-recall}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before running docker-compose.app.yml}"
    volumes:
      - app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - app_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    <<: *recall-build
    init: true
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      <<: *recall-env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    <<: *recall-build
    init: true
    command:
      [
        "celery",
        "-A",
        "tasks.celery_app:celery_app",
        "worker",
        "--loglevel=info",
        "-Q",
        "transcription,analysis,live_insights",
        "--concurrency=${CELERY_WORKER_CONCURRENCY:-2}",
        "-n",
        "recall-worker@%h",
      ]
    environment:
      <<: *recall-env
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app_pgdata:
  app_redisdata:
  app_storage:
